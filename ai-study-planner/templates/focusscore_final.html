<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Monitor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main container */
.container {
    text-align: center;
}

/* Glass card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 300px;
    margin: 20px auto;
    border: 1px solid rgba(255,255,255,0.1);
}

/* Circular meter */
.circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 20px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: bold;
    background: conic-gradient(#38bdf8 0deg, #1e293b 0deg);
    transition: 0.5s;
}

/* Status */
#status {
    margin-top: 10px;
    font-size: 14px;
    color: #cbd5f5;
}

/* Warning */
#warning {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #ef4444;
    padding: 15px 25px;
    border-radius: 10px;
    display: none;
    font-weight: bold;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.05); }
    100% { transform: translateX(-50%) scale(1); }
}

/* Blackout */
#blackout {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    z-index: 999;
}

/* Popup */
#popup {
    position: fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    background:#020617;
    padding:30px;
    border-radius:15px;
    display:none;
    z-index:1000;
    text-align:center;
}

button {
    margin:10px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.yes { background:#22c55e; color:white; }
.no { background:#ef4444; color:white; }

</style>
</head>

<body>

<div class="container">
    <h1>Focus Monitor</h1>

    <div class="card">
        <div class="circle" id="circle">0</div>
        <p id="status">Tracking...</p>
    </div>
</div>

<div id="warning">Stay Focused</div>
<div id="blackout"></div>

<div id="popup">
    <p>You seem distracted.<br>Take a short break?</p>
    <button class="yes" onclick="takeBreak()">Yes</button>
    <button class="no" onclick="continueWork()">No</button>
</div>

<script>

// ===== ORIGINAL LOGIC (UNCHANGED) =====
let eventsArr = [];
const WINDOW = 30000;
let lastMouseRecorded = 0;

let warningActive = false;
let warningStartTime = 0;

let blackoutActive = false;
let locked = false;

let tabInactive = false;

const circle = document.getElementById("circle");
const statusEl = document.getElementById("status");
const warning = document.getElementById("warning");
const blackout = document.getElementById("blackout");
const popup = document.getElementById("popup");

// activity
function recordActivity(){
    if(blackoutActive || locked) return;

    const now = Date.now();
    eventsArr.push(now);

    while(eventsArr.length && now - eventsArr[0] > WINDOW){
        eventsArr.shift();
    }

    if(warningActive) hideWarning();
}

// events
document.addEventListener("keydown", recordActivity);

document.addEventListener("mousemove", () => {
    const now = Date.now();
    if(now - lastMouseRecorded > 1000){
        recordActivity();
        lastMouseRecorded = now;
    }
});

document.addEventListener("visibilitychange", () => {
    if(document.hidden){
        tabInactive = true;
    } else {
        tabInactive = false;
        recordActivity();
    }
});

// warning
function showWarning(){
    if(warningActive) return;
    warningActive = true;
    warningStartTime = Date.now();
}

function hideWarning(){
    warning.style.display = "none";
    warningActive = false;
}

// blackout
function showBlackout(){
    blackout.style.display = "block";
    popup.style.display = "block";
    blackoutActive = true;
}

function hideBlackout(){
    blackout.style.display = "none";
    popup.style.display = "none";
    blackoutActive = false;
}

// actions
function takeBreak(){
    locked = true;
    popup.innerHTML = "<h3>Break Mode</h3><p>Returning in 5 mins...</p>";

    setTimeout(()=>{
        locked = false;
        hideBlackout();
        hideWarning();
    }, 300000);
}

function continueWork(){
    hideBlackout();
    hideWarning();
    warningStartTime = Date.now();
}

// LOOP
setInterval(()=>{

    if(locked) return;

    const now = Date.now();

    while(eventsArr.length && now - eventsArr[0] > WINDOW){
        eventsArr.shift();
    }

    let events = eventsArr.length;

    if(tabInactive) events = Math.max(0, events - 3);

    let focusScore = Math.min(10, Math.floor(events / 2));

    // 🔥 VISUAL UPDATE
    let deg = focusScore * 36; // 10 → 360deg
    circle.style.background = `conic-gradient(#38bdf8 ${deg}deg, #1e293b ${deg}deg)`;
    circle.innerText = focusScore;

    statusEl.innerText = tabInactive ? "Tab inactive ⚠️" : "Events: " + events;

    let lastEventTime = eventsArr.length ? eventsArr[eventsArr.length - 1] : 0;
    let idleTime = now - lastEventTime;

    if(idleTime > 6000 && !warningActive){
        showWarning();
    }

    if(warningActive){
        let remaining = Math.max(0, 60 - Math.floor((now - warningStartTime)/1000));
        warning.style.display = "block";
        warning.innerText = "Stay Focused - Break in " + remaining + "s";
    }

    if(warningActive && (now - warningStartTime > 60000) && !blackoutActive){
        showBlackout();
    }

},1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Scheduler</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    padding: 30px;
}

/* Container */
.container {
    max-width: 700px;
    margin: auto;
}

/* Header */
h1 {
    margin-bottom: 20px;
}

/* Input box */
.input-box {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

button {
    padding: 12px 16px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

/* Task card */
.task-card {
    background: rgba(255,255,255,0.05);
    padding: 18px;
    border-radius: 14px;
    margin-bottom: 12px;
    border-left: 6px solid #22c55e;
    transition: 0.3s;
}

.task-card:hover {
    transform: translateY(-4px);
}

/* Text */
.task-name {
    font-size: 18px;
    font-weight: bold;
}

.deadline {
    font-size: 13px;
    color: #cbd5f5;
}

.countdown {
    font-size: 14px;
    margin-top: 5px;
}

/* Priority colors */
.low { border-color: #22c55e; }
.medium { border-color: #facc15; }
.high { border-color: #ef4444; }

</style>
</head>

<body>

<div class="container">

    <h1>Task Scheduler</h1>

    <div class="input-box">
        <input id="taskName" placeholder="Task name">
        <input id="deadline" type="datetime-local">
        <input id="importance" type="number" min="1" max="5" placeholder="Importance">
        <button onclick="addTask()">Add</button>
    </div>

    <div id="taskList"></div>

</div>

<script>

// ===== YOUR ORIGINAL LOGIC (UPGRADED UI ONLY) =====

class Task {
    constructor(name, deadline, importance) {
        this.name = name;
        this.deadline = deadline ? new Date(deadline) : null;
        this.importance = importance;
        this.priority = this.calculatePriority();
    }

    calculatePriority() {
        let urgency = 0;

        if (this.deadline) {
            const now = new Date();
            const timeLeft = (this.deadline - now) / (1000 * 60 * 60);

            if (timeLeft <= 0) urgency = 10;
            else urgency = 1 / timeLeft;
        }

        return (this.importance * 3) + (urgency * 5);
    }
}

class MaxHeap {
    constructor() {
        this.heap = [];
    }

    insert(task) {
        this.heap.push(task);
        this.heap.sort((a, b) => b.priority - a.priority);
    }

    rebuildHeap() {
        this.heap.forEach(t => t.priority = t.calculatePriority());
        this.heap.sort((a, b) => b.priority - a.priority);
    }
}

const taskQueue = new MaxHeap();

function formatTime(date) {
    return date.toLocaleString();
}

function getCountdown(deadline) {
    const now = new Date();
    const diff = deadline - now;

    if (diff <= 0) return "Overdue 🔴";

    const h = Math.floor(diff / (1000*60*60));
    const m = Math.floor((diff/(1000*60))%60);
    const s = Math.floor((diff/1000)%60);

    return `${h}h ${m}m ${s}s`;
}

function getPriorityClass(priority){
    if(priority > 8) return "high";
    if(priority > 4) return "medium";
    return "low";
}

function addTask() {
    const name = document.getElementById("taskName").value.trim();
    const deadline = document.getElementById("deadline").value;
    const importance = parseInt(document.getElementById("importance").value);

    if (!name || isNaN(importance)) return alert("Fill all fields");

    const task = new Task(name, deadline, importance);
    taskQueue.insert(task);

    updateUI();
}

function updateUI() {
    const container = document.getElementById("taskList");
    container.innerHTML = "";

    taskQueue.heap.forEach(task => {

        const div = document.createElement("div");

        const cls = getPriorityClass(task.priority);

        div.className = "task-card " + cls;

        let deadlineHTML = "";

        if (task.deadline) {
            deadlineHTML = `
                <div class="deadline">Due: ${formatTime(task.deadline)}</div>
                <div class="countdown">${getCountdown(task.deadline)}</div>
            `;
        }

        div.innerHTML = `
            <div class="task-name">${task.name}</div>
            ${deadlineHTML}
        `;

        container.appendChild(div);
    });
}

// live update
setInterval(() => {
    taskQueue.rebuildHeap();
    updateUI();
}, 1000);

</script>

</body>
</html>
